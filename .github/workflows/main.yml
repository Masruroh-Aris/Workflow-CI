name: CI Workflow - MLflow Docker Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 tensorflow==2.15.0

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Latih Model dan Simpan Lokal
      run: |
        cd MLProject
        python modelling.py

    - name: MLflow Build Docker Image
      run: |
        cd MLProject
        # Perintah krusial syarat Advanced Dicoding
        mlflow models build-docker -m saved_model -n ${{ secrets.DOCKER_USERNAME }}/acne-model:latest

    - name: Push Image ke Docker Hub
      run: |
        # Mengunggah kontainer yang sudah jadi ke akun Docker Hub Anda
        docker push ${{ secrets.DOCKER_USERNAME }}/acne-model:latest